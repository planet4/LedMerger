<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LED Preview — Pixbo Rink</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#050505; color:#ccc; font-family:'Courier New',monospace; overflow:hidden; height:100vh; }
#topbar {
  position:fixed; top:0; left:0; right:0; height:36px;
  background:rgba(0,0,0,0.97); border-bottom:1px solid #111;
  display:flex; align-items:center; padding:0 16px; gap:14px; z-index:100;
  font-size:10px; letter-spacing:1px;
}
#topbar .logo { color:#CC1020; font-weight:bold; letter-spacing:3px; font-size:11px; }
#topbar .sep { color:#1e1e1e; }
#topbar .stat { color:#333; }
#topbar .stat span { color:#666; }
#topbar .controls { margin-left:auto; display:flex; gap:6px; }
#topbar button {
  background:#0a0a0a; border:1px solid #1e1e1e; color:#555;
  padding:3px 10px; border-radius:3px; font-size:9px;
  cursor:pointer; font-family:inherit; letter-spacing:1px; transition:all .15s;
}
#topbar button:hover { border-color:#CC1020; color:#fff; }
#topbar button.on { border-color:#CC1020; color:#CC1020; background:rgba(204,16,32,0.08); }
#stage {
  position:fixed; top:52px; left:20px;
  display:flex; flex-direction:column; gap:20px;
  transform-origin:top left;
}
.row-wrap { display:flex; flex-direction:column; gap:4px; }
.row-label { font-size:8px; color:#1a1a1a; letter-spacing:2px; text-transform:uppercase; padding-left:2px; }
.row { display:flex; gap:8px; align-items:flex-start; }
.unit { display:flex; flex-direction:column; gap:3px; }
.panel {
  background:#000; border-radius:3px; position:relative; overflow:hidden;
  box-shadow: 0 0 0 2px #111, 0 6px 30px rgba(0,0,0,0.95);
}
/* The main canvas uses CSS pixel-art scaling for crisp pixels */
.panel canvas.main-cv {
  display:block;
  image-rendering:pixelated;
}
/* Glow layer */
.glow-cv {
  position:absolute; inset:0; pointer-events:none;
  mix-blend-mode:screen; opacity:0; transition:opacity .3s;
  image-rendering:pixelated;
  filter:blur(4px) brightness(1.4);
}
.glow-cv.on { opacity:0.6; }
/* Grid overlay */
.grid-cv {
  position:absolute; inset:0; pointer-events:none;
  opacity:0; transition:opacity .2s;
}
.grid-cv.on { opacity:1; }
#videos { display:none; }
#loading {
  position:fixed; inset:0; background:#000;
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:10px; z-index:200; transition:opacity .5s;
}
#loading.fade { opacity:0; pointer-events:none; }
.spinner { width:20px; height:20px; border:2px solid #111; border-top-color:#CC1020; border-radius:50%; animation:spin .7s linear infinite; }
#loading p { font-size:10px; color:#333; letter-spacing:3px; }
@keyframes spin { to{transform:rotate(360deg)} }
#corner { position:fixed; bottom:10px; right:12px; font-size:8px; color:#111; letter-spacing:1px; line-height:1.9; text-align:right; text-transform:uppercase; }
</style>
</head>
<body>
<div id="topbar">
  <span class="logo">PIXBO LED</span>
  <span class="sep">|</span>
  <span class="stat">SCALE <span id="sScale">—</span></span>
  <span class="sep">|</span>
  <span class="stat">FPS <span id="sFps">—</span></span>
  <div class="controls">
    <button id="bGlow" onclick="toggleGlow()">GLOW</button>
    <button id="bGrid" onclick="toggleGrid()">GRID</button>
    <button id="bArena" onclick="toggleArena()">ARENA VIEW</button>
    <button onclick="syncAll()">SYNC</button>
    <button onclick="zoom(0.15)">+ ZOOM</button>
    <button onclick="zoom(-0.15)">− ZOOM</button>
    <button onclick="toggleFullscreen()">FULLSCREEN</button>
  </div>
</div>

<div id="videos"></div>
<div id="stage"></div>
<div id="loading"><div class="spinner"></div><p>LOADING DISPLAYS</p></div>
<div id="corner">Pixbo Wallenstam<br>LED Rink Simulator</div>

<!-- Arena View overlay -->
<div id="arenaView" style="display:none;position:fixed;inset:0;top:36px;background:#050505;z-index:50;overflow:hidden;">
  <canvas id="arenaCanvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
</div>

<script>
const QP = new URLSearchParams(location.search);
const DISPLAYS = [0,1,2,3,4].map(id => ({
  id,
  path:   QP.get('d'+id)||'',
  width:  parseInt(QP.get('w'+id))||576,
  height: 64,
  name:   QP.get('n'+id)||('Display '+id),
})).filter(d=>d.path);

const ROWS = [
  {label:'ROW 1', ids:[0,1]},
  {label:'ROW 2', ids:[2,3]},
  {label:'ROW 3', ids:[4]},
];

// Pixel display scale — CSS zoom makes pixels visible without slow JS loop
const ZOOM_PX = 5; // each LED pixel = 5x5 CSS pixels

let scale=1, glow=false, grid=false;
let fpsCnt=0, fpsTime=performance.now();

const vids={}, mainCv={}, glowCv={}, gridCv={}, srcCv={};

function disp(id){return DISPLAYS.find(d=>d.id===id);}

function computeScale(){
  const maxW=Math.max(...ROWS.map(r=>r.ids.reduce((s,id)=>{const d=disp(id);return s+(d?d.width:0);},0)));
  const activeRows=ROWS.filter(r=>r.ids.some(id=>disp(id))).length;
  const natW=maxW*ZOOM_PX, natH=activeRows*64*ZOOM_PX+activeRows*20+40;
  return Math.min((window.innerWidth-60)/natW,(window.innerHeight-90)/natH,1.5);
}

const IMAGE_EXTS=['png','jpg','jpeg','gif','webp'];
function isImage(p){return IMAGE_EXTS.includes(p.split('.').pop().toLowerCase());}

// Draw LED grid once onto a canvas
function drawGridOnce(cv, W, H){
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='rgba(0,0,0,0.5)';
  for(let x=ZOOM_PX;x<cv.width;x+=ZOOM_PX){
    ctx.fillRect(x,0,1,cv.height);
  }
  for(let y=ZOOM_PX;y<cv.height;y+=ZOOM_PX){
    ctx.fillRect(0,y,cv.width,1);
  }
}

function buildVideos(){
  const c=document.getElementById('videos');
  DISPLAYS.forEach(d=>{
    const url='/api/stream?path='+encodeURIComponent(d.path);
    let el;
    if(isImage(d.path)){
      el=document.createElement('img');
      el.src=url; el.crossOrigin='anonymous';
      el.style.display='none'; el._isImage=true;
    } else {
      el=document.createElement('video');
      el.src=url; el.muted=true; el.loop=true;
      el.playsInline=true; el.crossOrigin='anonymous';
      el.preload='auto'; el._isImage=false;
    }
    c.appendChild(el);
    vids[d.id]=el;
    // Source canvas at native resolution
    const sc=document.createElement('canvas');
    sc.width=d.width; sc.height=d.height;
    srcCv[d.id]=sc;
  });
}

function buildStage(){
  scale=computeScale();
  document.getElementById('sScale').textContent=scale.toFixed(2)+'x';
  const stage=document.getElementById('stage');
  stage.innerHTML='';
  stage.style.transform='scale('+scale+')';

  ROWS.forEach(row=>{
    const rowDisps=row.ids.map(id=>disp(id)).filter(Boolean);
    if(!rowDisps.length) return;

    const wrap=document.createElement('div'); wrap.className='row-wrap';
    const lbl=document.createElement('div'); lbl.className='row-label';
    lbl.textContent=rowDisps.map(d=>d.name+' '+d.width+'px').join(' + ');
    wrap.appendChild(lbl);
    const rowDiv=document.createElement('div'); rowDiv.className='row';

    rowDisps.forEach(d=>{
      // Panel dimensions in screen pixels
      const pw=d.width*ZOOM_PX, ph=d.height*ZOOM_PX;

      const unit=document.createElement('div'); unit.className='unit';
      const panel=document.createElement('div'); panel.className='panel';
      panel.style.width=pw+'px'; panel.style.height=ph+'px';

      // Main canvas — drawn at native size, scaled up via CSS
      const cv=document.createElement('canvas');
      cv.className='main-cv';
      cv.width=d.width; cv.height=d.height;
      cv.style.width=pw+'px'; cv.style.height=ph+'px';
      mainCv[d.id]=cv; panel.appendChild(cv);

      // Glow canvas — same native size, CSS blur does the work
      const gc=document.createElement('canvas');
      gc.className='glow-cv'+(glow?' on':'');
      gc.width=d.width; gc.height=d.height;
      gc.style.width=pw+'px'; gc.style.height=ph+'px';
      glowCv[d.id]=gc; panel.appendChild(gc);

      // Grid canvas — drawn once at screen size
      const grc=document.createElement('canvas');
      grc.className='grid-cv'+(grid?' on':'');
      grc.width=pw; grc.height=ph;
      drawGridOnce(grc, d.width, d.height);
      gridCv[d.id]=grc; panel.appendChild(grc);

      unit.appendChild(panel);
      rowDiv.appendChild(unit);
    });

    wrap.appendChild(rowDiv);
    stage.appendChild(wrap);
  });
}

function renderPanel(id){
  const v=vids[id], sc=srcCv[id], mc=mainCv[id], gc=glowCv[id], d=disp(id);
  if(!v||!sc||!mc||!d) return;
  if(v._isImage){if(!v.complete||!v.naturalWidth) return;}
  else{if(v.readyState<2) return;}

  const W=d.width, H=d.height;

  // Draw to source canvas at native res
  const sCtx=sc.getContext('2d',{willReadFrequently:true});
  sCtx.drawImage(v,0,0,W,H);

  // Draw to main canvas (native size — CSS zooms it up with pixelated rendering)
  const mCtx=mc.getContext('2d');
  mCtx.drawImage(sc,0,0);

  // Glow — just copy the same frame, CSS filter does blur+brightness
  if(glow){
    const gCtx=gc.getContext('2d');
    gCtx.drawImage(sc,0,0);
  }
}

function loop(){
  requestAnimationFrame(loop);
  fpsCnt++;
  const now=performance.now();
  if(now-fpsTime>=1000){
    document.getElementById('sFps').textContent=fpsCnt;
    fpsCnt=0; fpsTime=now;
  }
  DISPLAYS.forEach(d=>renderPanel(d.id));
}

function toggleGlow(){
  glow=!glow;
  document.getElementById('bGlow').classList.toggle('on',glow);
  Object.values(glowCv).forEach(gc=>gc.classList.toggle('on',glow));
}
function toggleGrid(){
  grid=!grid;
  document.getElementById('bGrid').classList.toggle('on',grid);
  Object.values(gridCv).forEach(gc=>gc.classList.toggle('on',grid));
}
function syncAll(){
  Object.values(vids).forEach(v=>{try{v.currentTime=0;}catch(e){}});
  setTimeout(()=>Object.values(vids).forEach(v=>{if(!v._isImage)v.play().catch(()=>{}); }),60);
}
function zoom(delta){
  scale=Math.max(0.1,Math.min(3,scale+delta));
  document.getElementById('stage').style.transform='scale('+scale+')';
  document.getElementById('sScale').textContent=scale.toFixed(2)+'x';
}
function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
window.addEventListener('resize',()=>{scale=computeScale();zoom(0);});
document.addEventListener('keydown',e=>{
  if(e.key==='+'||e.key==='=') zoom(0.15);
  if(e.key==='-') zoom(-0.15);
  if(e.key==='g'||e.key==='G') toggleGlow();
  if(e.key==='r'||e.key==='R') toggleGrid();
  if(e.key==='s'||e.key==='S') syncAll();
  if(e.key==='f'||e.key==='F') toggleFullscreen();
});

// ── ARENA VIEW ──────────────────────────────────────────────────────────────
let arenaMode = false;
let arenaImg = null;

// Arena zones: 4 corners [TL, TR, BR, BL] as fractions of 1920×1080
// Tune these coordinates if strips need repositioning
const ARENA_ZONES = [
  // pts: [TL, TR, BR, BL] as fractions of 1920×1080
  { id:0, label:'Shortside',       w:1344, pts:[[0.00365,0.53148],[0.28438,0.48981],[0.28594,0.50833],[0.00260,0.55556]] },
  { id:1, label:'L-Left',          w:576,  pts:[[0.33125,0.48704],[0.39688,0.50000],[0.39583,0.51852],[0.33177,0.50370]] },
  { id:2, label:'Longside Center', w:1728, pts:[[0.42448,0.50463],[0.73698,0.55833],[0.73594,0.58426],[0.42396,0.52222]] },
  { id:3, label:'L-Right',         w:576,  pts:[[0.80469,0.56852],[0.99635,0.60370],[0.99427,0.63889],[0.80417,0.59815]] },
  { id:4, label:'Media',           w:192,  pts:[[0.04740,0.83241],[0.14844,0.83704],[0.14948,0.88796],[0.04427,0.88519]] },
];

function drawArenaView() {
  const cv = document.getElementById('arenaCanvas');
  const W = cv.offsetWidth, H = cv.offsetHeight;
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');

  if (arenaImg && arenaImg.complete) {
    // Fit image to canvas
    const imgAr = arenaImg.naturalWidth / arenaImg.naturalHeight;
    const canAr = W / H;
    let dw, dh, dx, dy;
    if (imgAr > canAr) { dw=W; dh=W/imgAr; dx=0; dy=(H-dh)/2; }
    else { dh=H; dw=H*imgAr; dy=0; dx=(W-dw)/2; }
    ctx.drawImage(arenaImg, dx, dy, dw, dh);

    ARENA_ZONES.forEach(zone => {
      const v = vids[zone.id];
      if (!v) return;
      if (v._isImage) { if (!v.complete || !v.naturalWidth) return; }
      else { if (v.readyState < 2) return; }

      // Convert fractional corners to canvas coords
      const pts = zone.pts.map(([fx,fy]) => [dx + fx*dw, dy + fy*dh]);

      // Expand 5% outward from quad centre to ensure full coverage
      const cx = pts.reduce((s,p)=>s+p[0],0)/4;
      const cy = pts.reduce((s,p)=>s+p[1],0)/4;
      const [TL,TR,,BL] = pts.map(([px,py]) => [cx+(px-cx)*1.05, cy+(py-cy)*1.05]);

      // Affine transform: maps source rect (0,0,w,64) onto the angled quad
      const a=(TR[0]-TL[0])/zone.w, b=(TR[1]-TL[1])/zone.w;
      const c=(BL[0]-TL[0])/64,     d=(BL[1]-TL[1])/64;

      ctx.save();
      ctx.globalAlpha = 0.92;
      ctx.setTransform(a, b, c, d, TL[0], TL[1]);
      ctx.drawImage(v, 0, 0, zone.w, 64);
      ctx.restore();
    });
  } else {
    ctx.fillStyle = '#111';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#333';
    ctx.font = '14px Courier New';
    ctx.fillText('Loading arena image...', 20, 50);
  }
}

function toggleArena() {
  arenaMode = !arenaMode;
  document.getElementById('bArena').classList.toggle('on', arenaMode);
  document.getElementById('arenaView').style.display = arenaMode ? 'block' : 'none';

  if (arenaMode && !arenaImg) {
    arenaImg = new Image();
    arenaImg.onload = () => {};
    arenaImg.src = '/api/layout-image';
  }
}

function arenaLoop() {
  if (arenaMode) drawArenaView();
  requestAnimationFrame(arenaLoop);
}

async function init(){
  buildVideos(); buildStage(); loop();
  await Promise.all(DISPLAYS.map(d=>new Promise(res=>{
    const v=vids[d.id]; if(!v){res();return;}
    if(v._isImage){
      if(v.complete&&v.naturalWidth){res();return;}
      v.addEventListener('load',res,{once:true});
      v.addEventListener('error',res,{once:true});
    } else {
      if(v.readyState>=3){res();return;}
      v.addEventListener('canplaythrough',res,{once:true});
      v.addEventListener('error',res,{once:true});
    }
    setTimeout(res,5000);
  })));
  await Promise.all(DISPLAYS.map(d=>{
    const v=vids[d.id];
    if(!v||v._isImage) return Promise.resolve();
    return v.play().catch(()=>{});
  }));
  const ld=document.getElementById('loading');
  ld.classList.add('fade');
  setTimeout(()=>ld.style.display='none',600);
}
init();
arenaLoop();
</script>
</body>
</html>
